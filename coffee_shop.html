<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Haven</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: grid;
      width: 100%;
      margin: 0;
      background-color: #A3B18A;
      color: BurlyWood;
      grid-template-areas:
        "header"
        "nav"
        "main"
        "footer";
      grid-template-rows: auto auto 5fr auto;
      min-height: 100vh;
    }

    header {
      grid-area: header;
      background-color: BurlyWood;
      color: SaddleBrown;
      text-align: center;
      padding: 4rem;
    }
    
    header h1 {
      text-decoration: underline;
    }

    nav {
      grid-area: nav;
      background-color: white;
      padding: 2rem 0;
    }

    main {
      grid-area: main;
      padding: 4rem;
    }
    
    main h2 {
      text-decoration: underline;
    }

    footer {
      grid-area: footer;
      background-color: white;
      color: BurlyWood;
      text-align: center;
      padding: 4rem:
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 3rem;
      text-decoration: underline;
      margin: 0;
      padding: 0;
    }

    nav li a {
      text-decoration: overline;
      color: BurlyWood;
      font-weight: bold;
    }

    nav a:hover {
      color: #4B2E2B;
    }

    .flex-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 2rem;
      margin-top: 20px
    }

    .flex-item {
      background-color: #4B2E2B;
      padding: 2rem;
      border-radius: 5px;
      box-shadow: 7px 7px BurlyWood;
      text-align: center;
    }

    @media (max-width: 500px) {
      nav ul {
        flex-direction: column;
        align-items: center;
      }
      
      .flex-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        align-items: center;
      }
      
      .flex-item {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Java Haven</h1>
    <p>Your daily dose of caffeine and comfort.</p>
  </header>
  
  <nav class="nav">
    <ul>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#about">About Us</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  
  <main class="main-content">
    <h2>Featured Coffees</h2>
    <div class="flex-container">
      <div class="flex-item">Espresso</div>
      <div class="flex-item">Cappuccino</div>
      <div class="flex-item">Latte</div>
      <div class="flex-item">Mocha</div>
    </div>
  </main>
  
  <footer class="footer">
    <p>&copy; 2025 Java Haven. All Rights Reserved.</p>
  </footer>
</body>
</html>>
