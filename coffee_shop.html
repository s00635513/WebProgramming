<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Haven</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: sans-serif;
      display: grid;
      background-color: black;
      color: SaddleBrown;
      grid-template-areas:
        "header"
        "nav"
        "main"
        "footer";

      grid-template-rows: auto auto 1fr auto;
      min-height: 70vh;
    }

    header {
      grid-area: header;
      background-color: BurlyWood;
      color: SaddleBrown;
      text-align: center;
      padding: 7rem;
    }

    nav {
      grid-area: nav;
      background-color: pink;
      padding: 5rem;
    }

    main {
      grid-area: main;
      padding: 10rem;
    }

    footer {
      grid-area: footer;
      background-color: pink;
      color: SaddleBrown;
      text-align: center;
      padding: 5rem:
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 5rem;
    }

    nav a {
      text-decoration: none;
      color: SaddleBrown;
      font-weight: bold;
    }

    nav a:hover {
      color: blue;
    }

    .flex-container {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 5rem;
      margin-top: 20px
    }

    .flex-item {
      background-color: pink;
      padding: 10rem;
      border-radius: 5px;
      box-shadow: 7px 7px BurlyWood;
      min-width: 150px;
      text-align: center;
    }

    @media (max-width: 100px) {
      nav ul {
        flex-direction: column;
        align-items: center;
      }
      .flex-container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Java Haven</h1>
    <p>Your daily dose of caffeine and comfort.</p>
  </header>
  
  <nav class="nav">
    <ul>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#about">About Us</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  
  <main class="main-content">
    <h2>Featured Coffees</h2>
    <div class="flex-container">
      <div class="flex-item">Espresso</div>
      <div class="flex-item">Cappuccino</div>
      <div class="flex-item">Latte</div>
      <div class="flex-item">Mocha</div>
    </div>
  </main>
  
  <footer class="footer">
    <p>&copy; 2025 Java Haven. All Rights Reserved.</p>
  </footer>
</body>
</html>>
